<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 320" width="100%" height="100%" style="border-radius: 16px;">
  <defs>
    <!-- Import Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&amp;family=Inter:wght@400;500;600&amp;display=swap');
      .title {
        font-family: 'Outfit', 'Inter', sans-serif;
        font-weight: 900;
        font-size: 54px;
        fill: url(#text-gradient);
        letter-spacing: -1.5px;
      }
      .subtitle {
        font-family: 'Outfit', 'Inter', sans-serif;
        font-weight: 500;
        font-size: 21px;
        fill: #e4e4e7;
        letter-spacing: 0.5px;
      }
      .badge-text {
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        font-size: 11px;
        fill: #3b82f6;
        letter-spacing: 1px;
      }
      .glow-effect {
        filter: url(#blur-glow);
      }
    </style>

    <!-- Filters -->
    <filter id="blur-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40" result="blur" />
    </filter>

    <!-- Gradients -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="100%" stop-color="#141414" />
    </linearGradient>

    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <radialGradient id="glow-left" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="glow-right" cx="100%" cy="100%" r="70%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.18" />
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
    </radialGradient>

    <!-- Patterns -->
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" fill-opacity="0.05" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-gradient)" />
  
  <!-- Glowing Background Blobs -->
  <rect width="100%" height="100%" fill="url(#glow-left)" />
  <rect width="100%" height="100%" fill="url(#glow-right)" />

  <!-- Grid Pattern -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Abstract Graphic Element (Cybernetic/Tech styling) -->
  <g transform="translate(640, 160)">
    <!-- Outer Glow Circle -->
    <circle r="80" fill="none" stroke="url(#text-gradient)" stroke-width="1" stroke-opacity="0.15" class="glow-effect" />
    <!-- Outer dashed circle -->
    <circle r="75" fill="none" stroke="url(#text-gradient)" stroke-width="1.5" stroke-dasharray="8 6" stroke-opacity="0.4" />
    <!-- Inner solid circle -->
    <circle r="45" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3" />
    <!-- Rotating look crosshairs -->
    <line x1="-90" y1="0" x2="-60" y2="0" stroke="#3b82f6" stroke-width="1.5" opacity="0.6" />
    <line x1="60" y1="0" x2="90" y2="0" stroke="#ec4899" stroke-width="1.5" opacity="0.6" />
    <line x1="0" y1="-90" x2="0" y2="-60" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6" />
    <line x1="0" y1="60" x2="0" y2="90" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6" />
    
    <!-- Code Symbol -->
    <text x="0" y="12" font-family="'Outfit', sans-serif" font-weight="700" font-size="36" fill="url(#text-gradient)" text-anchor="middle">&lt;/&gt;</text>
  </g>

  <!-- Left Content Wrapper -->
  <g transform="translate(60, 0)">
    <!-- Decorative tag -->
    <rect x="0" y="70" width="140" height="26" rx="13" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="1" />
    <circle cx="15" cy="83" r="4" fill="#3b82f6" />
    <text x="28" y="86" class="badge-text">DEVELOPER PROFILE</text>

    <!-- Main Title -->
    <text x="0" y="150" class="title">YASIR FAIZAN</text>

    <!-- Subtitle -->
    <text x="0" y="195" class="subtitle">MERN Stack Developer &amp; Cloud Enthusiast</text>
    
    <!-- Tech stack text / icons style -->
    <text x="0" y="235" font-family="'Inter', sans-serif" font-weight="500" font-size="12" fill="#8a8a93" letter-spacing="2px">
      REACT • NODE.JS • EXPRESS • MONGODB • TAILWIND • FIREBASE
    </text>
  </g>

  <!-- Fine Border around the banner -->
  <rect x="0.5" y="0.5" width="849" height="319" rx="15.5" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" />
</svg>
