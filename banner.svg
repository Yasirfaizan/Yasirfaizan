<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 320" width="100%" height="100%" style="border-radius: 16px;">
  <defs>
    <!-- Import Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&amp;family=Inter:wght@400;500;600;700&amp;display=swap');
      .title {
        font-family: 'Outfit', 'Inter', sans-serif;
        font-weight: 900;
        font-size: 56px;
        fill: url(#text-gradient);
        letter-spacing: -1.5px;
      }
      .subtitle {
        font-family: 'Outfit', 'Inter', sans-serif;
        font-weight: 500;
        font-size: 22px;
        fill: #f4f4f5;
        letter-spacing: 0.5px;
      }
      .badge-text {
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        font-size: 11px;
        fill: #3b82f6;
        letter-spacing: 1.5px;
      }
      .glow-effect {
        filter: url(#blur-glow);
      }
      .floating-code {
        font-family: monospace;
        font-size: 14px;
        fill: #ffffff;
        opacity: 0.15;
      }
    </style>

    <!-- Filters -->
    <filter id="blur-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="blur" />
    </filter>
    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
    </filter>

    <!-- Gradients -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="100%" stop-color="#0f0f12" />
    </linearGradient>

    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <radialGradient id="glow-left" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="glow-right" cx="100%" cy="100%" r="70%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.22" />
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
    </radialGradient>

    <!-- Patterns -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#ffffff" fill-opacity="0.06" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-gradient)" />
  
  <!-- Glowing Background Blobs -->
  <rect width="100%" height="100%" fill="url(#glow-left)" />
  <rect width="100%" height="100%" fill="url(#glow-right)" />

  <!-- Grid Pattern -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Floating Code Snippets for tech aesthetic -->
  <text x="70" y="50" class="floating-code">const developer = new MERNStack();</text>
  <text x="350" y="45" class="floating-code">import { useState } from 'react';</text>
  <text x="680" y="70" class="floating-code">await db.connect();</text>
  <text x="180" y="295" class="floating-code">console.log("Ready to build!");</text>
  <text x="540" y="290" class="floating-code">&lt;Component /&gt;</text>

  <!-- Abstract Cybernetic Circle Graphic -->
  <g transform="translate(650, 160)">
    <!-- Outer Glow Circle -->
    <circle r="85" fill="none" stroke="url(#text-gradient)" stroke-width="1" stroke-opacity="0.2" class="glow-effect" />
    <!-- Outer dashed circle -->
    <circle r="78" fill="none" stroke="url(#text-gradient)" stroke-width="1.8" stroke-dasharray="10 8" stroke-opacity="0.5" />
    <!-- Inner solid circle -->
    <circle r="48" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.4" />
    
    <!-- Rotating crosshairs -->
    <line x1="-95" y1="0" x2="-65" y2="0" stroke="#3b82f6" stroke-width="2" opacity="0.7" />
    <line x1="65" y1="0" x2="95" y2="0" stroke="#ec4899" stroke-width="2" opacity="0.7" />
    <line x1="0" y1="-95" x2="0" y2="-65" stroke="#8b5cf6" stroke-width="2" opacity="0.7" />
    <line x1="0" y1="65" x2="0" y2="95" stroke="#8b5cf6" stroke-width="2" opacity="0.7" />
    
    <!-- Tech dots -->
    <circle cx="-55" cy="-55" r="3" fill="#3b82f6" opacity="0.8" />
    <circle cx="55" cy="55" r="3" fill="#ec4899" opacity="0.8" />
    
    <!-- Code Symbol -->
    <text x="0" y="13" font-family="'Outfit', sans-serif" font-weight="900" font-size="38" fill="url(#text-gradient)" text-anchor="middle">&lt;/&gt;</text>
  </g>

  <!-- Left Content Wrapper -->
  <g transform="translate(60, 0)">
    <!-- Decorative tag -->
    <rect x="0" y="65" width="165" height="28" rx="14" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1.2" />
    <circle cx="16" cy="79" r="4.5" fill="#3b82f6" />
    <text x="30" y="83" class="badge-text">PORTFOLIO PROFILE</text>

    <!-- Glowing Background for Title -->
    <text x="0" y="150" class="title glow-effect" opacity="0.5">YASIR FAIZAN</text>
    <!-- Main Title -->
    <text x="0" y="150" class="title">YASIR FAIZAN</text>

    <!-- Subtitle -->
    <text x="0" y="198" class="subtitle">MERN Stack Developer &amp; Cloud Enthusiast</text>
    
    <!-- Tech stack text / icons style -->
    <text x="0" y="240" font-family="'Inter', sans-serif" font-weight="600" font-size="12.5" fill="#9ca3af" letter-spacing="2px">
      REACT • NODE.JS • EXPRESS • MONGODB • TAILWIND • FIREBASE
    </text>
  </g>

  <!-- Fine Border around the banner -->
  <rect x="0.5" y="0.5" width="849" height="319" rx="15.5" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" />
</svg>
